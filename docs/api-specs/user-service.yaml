openapi: 3.0.3
info:
  title: User Service API
  description: |
    Entity Service — quản lý thông tin user profile.
    Được gọi bởi PlaceBookingService (sync REST) để xác minh user và lấy thông tin (tên, email) trước khi bắt đầu Saga.
  version: 1.0.0

servers:
  - url: http://localhost:5002
    description: Local development

tags:
  - name: Health
  - name: Users

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Lấy thông tin user theo ID
      description: |
        Được gọi bởi PlaceBookingService để xác minh user tồn tại
        và lấy email, tên phục vụ các bước sau của Saga.
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 255
            pattern: '^[A-Za-z0-9-]+$'
          example: US-001
      responses:
        '200':
          description: Thông tin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Request không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: USER_NOT_FOUND
                message: User với ID US-999 không tồn tại

components:
  schemas:
    User:
      type: object
      properties:
        userId:
          type: string
          example: US-001
        name:
          type: string
          example: Nguyen Van A
        email:
          type: string
          format: email
          example: nguyenvana@email.com
        phone:
          type: string
          example: "0901234567"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T08:30:00Z"
        roles:
          type: array
          items:
            type: string
          example: ["CUSTOMER"]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: USER_NOT_FOUND
        message:
          type: string
          example: User không tồn tại
