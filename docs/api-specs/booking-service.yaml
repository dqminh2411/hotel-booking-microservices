  /bookings/count:
    get:
      tags: [Bookings]
      summary: Đếm số booking đang active trong khoảng thời gian checkin-checkout của hotel nhóm theo roomTypeId để tính availability cho mỗi loại phòng
      description: |
        Internal API — được gọi bởi hotel-service để tính room availability.
        Đếm số booking có status PENDING hoặc CONFIRMED, có overlap với khoảng checkin–checkout,
        theo roomTypeId cụ thể.
        Logic overlap: booking overlap nếu booking.checkin < checkout AND booking.checkout > checkin
      operationId: countBookings
      parameters:
        - name: hotelId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        - name: roomTypeList
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
            example: [rt-001-uuid, rt-002-uuid]
        - name: checkin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-06-01"
        - name: checkout
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-06-05"
      responses:
        '200':
          description: Số booking đang active trong khoảng thời gian checkin-checkout nhóm theo roomTypeId
          content:
            application/json:
              schema:
                type: object
                properties:
                  hotelId:
                    type: string
                    format: uuid
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  checkin:
                    type: string
                    format: date
                    example: "2024-06-01"
                  checkout:
                    type: string
                    format: date
                    example: "2024-06-05"
                  activeBookingCount:
                    type: array
                    items:
                      type: object
                      properties:
                        roomTypeId:
                          type: string
                          format: uuid
                          example: rt-001-uuid
                        count:
                          type: integer
                          example: 6
                    description: Số booking PENDING + CONFIRMED trong khoảng thời gian nhóm theo roomTypeId
                    example: [
                      {
                        roomTypeId: rt-001-uuid,
                        count: 6
                      },
                      {
                        roomTypeId: rt-002-uuid,
                        count: 4
                      }
                    ]
        '400':
          description: Thiếu hoặc sai tham số
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: checkin và checkout là bắt buộc, 1 trong 2 tham số hotelId và roomTypeList là bắt buộc


  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Lấy thông tin booking theo ID
      description: |
        Client dùng để polling trạng thái Saga sau khi nhận 202 Accepted từ PlaceBookingService.
        Trạng thái PENDING = đang xử lý, CONFIRMED = thành công, FAILED = thất bại, CANCELLED = huỷ do payment.
      operationId: getBookingById
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: bk-550e8400
      responses:
        '200':
          description: Thông tin booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Booking không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: BOOKING_NOT_FOUND
                message: Booking không tồn tại

  /bookings/{bookingId}/status:
    patch:
      tags: [Bookings]
      summary: Cập nhật trạng thái booking
      description: |
        Được gọi bởi PlaceBookingService (qua Kafka commands):
        - "ConfirmBooking" → CONFIRMED
        - "CancelBooking" → CANCELLED
      operationId: updateBookingStatus
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: bk-550e8400
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/BookingStatus'
            example:
              status: CONFIRMED
      responses:
        '200':
          description: Trạng thái booking đã được cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Chuyển trạng thái không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_STATUS_TRANSITION
                message: Không thể chuyển từ CONFIRMED sang PENDING
        '404':
          description: Booking không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED, FAILED]
      description: |
        - PENDING: Booking vừa được tạo, Saga đang xử lý
        - CONFIRMED: Thanh toán thành công, booking xác nhận
        - CANCELLED: Thanh toán thất bại hoặc Saga rollback
        - FAILED: Đặt phòng thất bại do lỗi hệ thống (không đủ phòng,...)

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          format: uuid
          example: bk-550e8400
        customer:
          type: object
          properties:
            name:
              type: string
              example: Nguyen Van A
            email:
              type: string
              format: email
              example: nva@gmail.com
        status:
          $ref: '#/components/schemas/BookingStatus'
        checkin:
          type: string
          format: date
        checkout:
          type: string
          format: date
        numAdults:
          type: integer
          example: 2
        totalAmount:
          type: number
          format: double
        hotel:
          type: object
          properties:
            name:
              type: string
              example: Hotel ABC
            address:
              type: string
              example: Ha Dong, Ha Noi
        roomTypeList:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Deluxe
              bedCount:
                type: integer
                example: 2
              bookingQuantity:
                type: integer
                example: 1
              price:
                type: number
                format: double
                example: 1000000

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: BOOKING_NOT_FOUND
        message:
          type: string
          example: Booking không tồn tại

