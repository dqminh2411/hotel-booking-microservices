openapi: 3.0.3
info:
  title: Booking Service API
  description: |
    Entity Service — lưu trữ và quản lý booking records.
    Có 3 loại consumer:
    - PlaceBookingService gọi qua Kafka (create, confirm, cancel booking)
    - hotel-service gọi REST đồng bộ để lấy booking count phục vụ availability check
    - Client gọi REST để polling trạng thái booking sau khi nhận 202 Accepted
  version: 1.0.0

servers:
  - url: http://localhost:5004
    description: Local development

tags:
  - name: Health
  - name: Bookings

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

