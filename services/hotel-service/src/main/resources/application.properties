spring.application.name=hotel-service
server.port=${SERVER_PORT:5000}

spring.datasource.url=jdbc:postgresql://${DB_HOST:hotel-db}:${DB_PORT:5432}/${DB_NAME:hotel_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.serialization.write-dates-as-timestamps=false

eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}

booking-service.url=${BOOKING_SERVICE_URL:http://booking-service:5004}
