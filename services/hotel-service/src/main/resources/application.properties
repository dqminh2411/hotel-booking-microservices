spring.application.name=hotel-service
server.port=${SERVER_PORT:5000}

spring.datasource.url=jdbc:postgresql://${DB_HOST:hotel-db}:${DB_PORT:5432}/${DB_NAME:hotel_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.serialization.write-dates-as-timestamps=false

eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}

spring.cloud.openfeign.client.config.booking-service.connectTimeout=${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
spring.cloud.openfeign.client.config.booking-service.readTimeout=${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}
