spring.application.name=place-booking-service

# SERVER
server.port=${SERVER_PORT:5000}

# DATABASE (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:place-booking-db}:${DB_PORT:5432}/${DB_NAME:place_booking_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# KAFKA
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:place-booking-group}
spring.kafka.consumer.auto-offset-reset=earliest

# deserialize JSON
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# serialize JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# EUREKA
eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}


# CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
