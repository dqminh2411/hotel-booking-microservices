spring.application.name=payment-service

# SERVER
server.port=${SERVER_PORT:5000}

# KAFKA
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:payment-group}
spring.kafka.consumer.auto-offset-reset=earliest

# deserialize JSON
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# serialize JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ======================
# RESILIENCE4J CIRCUIT BREAKER
# ======================
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.paymentGateway.base-config=default

# Outbox publisher
outbox.publisher.delay=100

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:postgresql://${PAYMENT_DB_HOST:payment-db}:${PAYMENT_DB_PORT:5432}/${PAYMENT_DB_NAME:payment_db}
spring.datasource.username=${PAYMENT_DB_USER:postgres}
spring.datasource.password=${PAYMENT_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# EUREKA
eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}

