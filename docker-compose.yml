# Docker Compose — Multi-container orchestration
# Run: docker compose up --build
# Docs: https://docs.docker.com/compose/

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - app-network

  # ─── API Gateway ─────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT}:8000"
    depends_on:
      - user-service
      - hotel-service
      - booking-service
    env_file:
      - .env
    environment:
      USER_SERVICE_URL: http://user-service:5000
      HOTEL_SERVICE_URL: http://hotel-service:5000
    networks:
      - app-network

  # ─── Service A ───────────────────────────────────
#  service-a:
#    build: ./services/service-a
#    ports:
#      - "${SERVICE_A_PORT:-5001}:5000"
##    env_file:
##      - .env
#    networks:
#      - app-network
#    # healthcheck:
#    #   test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
#    #   interval: 30s
#    #   timeout: 10s
#    #   retries: 3

  # ─── Service B ───────────────────────────────────
#  service-b:
#    build: ./services/service-b
#    ports:
#      - "${SERVICE_B_PORT:-5002}:5000"
##    env_file:
##      - .env
#    networks:
#      - app-network



  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - app-network


  # ─── Notification Service ────────────────────────
  notification-service:
    build: ./services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5006}:5006"
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    env_file:
      - ./services/notification-service/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── User Service ─────────────────────────────────
  user-service:
    build: ./services/user-service
    ports:
      - "${USER_SERVICE_PORT:-5002}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - app-network

  # ─── User Database ───────────────────────────────
  user-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./scripts/user_db/user_db_init.sql:/docker-entrypoint-initdb.d/user_db_init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── Hotel Service ───────────────────────────────
  hotel-service:
    build: ./services/hotel-service
    ports:
      - "${HOTEL_SERVICE_PORT}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${HOTEL_DB_HOST}
      DB_PORT: ${HOTEL_DB_PORT}
      DB_NAME: ${HOTEL_DB_NAME}
      DB_USER: ${HOTEL_DB_USER}
      DB_PASSWORD: ${HOTEL_DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      hotel-db:
        condition: service_healthy
      booking-service:
        condition: service_started
    networks:
      - app-network

  # ─── Booking Service ─────────────────────────────
  booking-service:
    build: ./services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-5004}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP}
      OUTBOX_RELAY_INTERVAL_MS: ${OUTBOX_RELAY_INTERVAL_MS}
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - app-network

  # ─── Hotel Database ──────────────────────────────
  hotel-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${HOTEL_DB_EXTERNAL_PORT}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${HOTEL_DB_NAME}
      POSTGRES_USER: ${HOTEL_DB_USER}
      POSTGRES_PASSWORD: ${HOTEL_DB_PASSWORD}
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
      - ./scripts/hotel_db/hotel_db_init.sql:/docker-entrypoint-initdb.d/hotel_db_init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── Booking Database ────────────────────────────
  booking-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${BOOKING_DB_EXTERNAL_PORT}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${BOOKING_DB_NAME}
      POSTGRES_USER: ${BOOKING_DB_USER}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
      - ./scripts/booking_db/booking_db_init.sql:/docker-entrypoint-initdb.d/booking_db_init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Shared Infrastructure (uncomment as needed) ─
  # db:
  #   image: postgres:16-alpine    # or mysql:8, mongo:7, etc.
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   environment:
  #     POSTGRES_DB: ${DB_NAME:-mydb}
  #     POSTGRES_USER: ${DB_USER:-admin}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network



networks:
  app-network:
    driver: bridge

volumes:
  user-db-data:
  hotel-db-data:
  booking-db-data:
