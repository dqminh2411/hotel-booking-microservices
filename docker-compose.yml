# Docker Compose — Multi-container orchestration
# Run: docker compose up --build
# Docs: https://docs.docker.com/compose/

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - gateway
    networks:
      - app-network

  eureka-server:
    build: ./services/eureka-server
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      eureka-server:
        condition: service_healthy
      place-booking-service:
        condition: service_started
      booking-service:
        condition: service_started
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "${KAFKA_INTERNAL_PORT:-29092}:29092"
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - app-network

  user-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./scripts/user_db/user_db_init.sql:/docker-entrypoint-initdb.d/user_db_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  hotel-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${HOTEL_DB_EXTERNAL_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${HOTEL_DB_NAME}
      POSTGRES_USER: ${HOTEL_DB_USER}
      POSTGRES_PASSWORD: ${HOTEL_DB_PASSWORD}
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
      - ./scripts/hotel_db/hotel_db_init.sql:/docker-entrypoint-initdb.d/hotel_db_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HOTEL_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  booking-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${BOOKING_DB_EXTERNAL_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${BOOKING_DB_NAME}
      POSTGRES_USER: ${BOOKING_DB_USER}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
      - ./scripts/booking_db/booking_db_init.sql:/docker-entrypoint-initdb.d/booking_db_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKING_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  place-booking-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${PLACE_BOOKING_DB_EXTERNAL_PORT:-5435}:5432"
    environment:
      POSTGRES_DB: ${PLACE_BOOKING_DB_NAME}
      POSTGRES_USER: ${PLACE_BOOKING_DB_USER}
      POSTGRES_PASSWORD: ${PLACE_BOOKING_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLACE_BOOKING_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  payment-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${PAYMENT_DB_EXTERNAL_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME}
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  user-service:
    build: ./services/user-service
    ports:
      - "${USER_SERVICE_PORT:-5002}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      user-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

  hotel-service:
    build: ./services/hotel-service
    ports:
      - "${HOTEL_SERVICE_PORT:-5003}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${HOTEL_DB_HOST}
      DB_PORT: ${HOTEL_DB_PORT}
      DB_NAME: ${HOTEL_DB_NAME}
      DB_USER: ${HOTEL_DB_USER}
      DB_PASSWORD: ${HOTEL_DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      hotel-db:
        condition: service_healthy
      booking-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

  booking-service:
    build: ./services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-5004}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      SERVER_PORT: 5000
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-booking-service-group}
      OUTBOX_RELAY_INTERVAL_MS: ${OUTBOX_RELAY_INTERVAL_MS:-100}
    depends_on:
      booking-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

  place-booking-service:
    build: ./services/place_booking_service
    ports:
      - "${PLACE_BOOKING_SERVICE_PORT:-5001}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${PLACE_BOOKING_DB_HOST}
      DB_PORT: ${PLACE_BOOKING_DB_PORT}
      DB_NAME: ${PLACE_BOOKING_DB_NAME}
      DB_USER: ${PLACE_BOOKING_DB_USER}
      DB_PASSWORD: ${PLACE_BOOKING_DB_PASSWORD}
      SERVER_PORT: 5000
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: place-booking-group
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      place-booking-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      hotel-service:
        condition: service_started
      booking-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build: ./services/payment_service
    ports:
      - "${PAYMENT_SERVICE_PORT:-5005}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: ${PAYMENT_DB_HOST}
      DB_PORT: ${PAYMENT_DB_PORT}
      DB_NAME: ${PAYMENT_DB_NAME}
      DB_USER: ${PAYMENT_DB_USER}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      SERVER_PORT: 5000
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: payment-group
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5006}:5000"
    env_file:
      - .env
    environment:
      SERVER_PORT: 5000
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: notification-group
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  user-db-data:
  hotel-db-data:
  booking-db-data:
